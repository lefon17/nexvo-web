<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin — Nexvo</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: Arial, sans-serif; background: #07070F; color: #F0F0FF; min-height: 100vh; }
    .login-screen { display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .login-box { background: #10101C; border: 1px solid rgba(255,255,255,0.07); border-radius: 20px; padding: 40px; width: 100%; max-width: 400px; }
    .login-box h1 { color: #5B6BF8; font-size: 28px; margin-bottom: 8px; }
    .login-box p { color: #5A5A7A; font-size: 13px; margin-bottom: 24px; }
    input { width: 100%; background: #181828; border: 1px solid rgba(255,255,255,0.07); border-radius: 10px; padding: 12px; color: #F0F0FF; font-size: 14px; margin-bottom: 12px; }
    .btn { width: 100%; background: #5B6BF8; color: white; border: none; border-radius: 12px; padding: 13px; font-size: 15px; font-weight: 700; cursor: pointer; }
    .btn:hover { background: #4a5ae0; }
    .btn-green { background: #1EEBB4; color: #07070F; }
    .btn-red { background: rgba(255,75,110,0.2); color: #FF4B6E; border: 1px solid rgba(255,75,110,0.3); }
    .btn-orange { background: rgba(255,140,66,0.2); color: #FF8C42; border: 1px solid rgba(255,140,66,0.3); }
    .btn-small { width: auto; padding: 8px 16px; font-size: 12px; border-radius: 8px; }
    .dashboard { padding: 24px; max-width: 1100px; margin: 0 auto; }
    .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 32px; }
    .header h1 { color: #5B6BF8; font-size: 24px; }
    .card { background: #10101C; border: 1px solid rgba(255,255,255,0.07); border-radius: 16px; padding: 20px; margin-bottom: 16px; }
    .card-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 16px; }
    .user-name { font-size: 16px; font-weight: 700; color: #F0F0FF; }
    .user-email { font-size: 12px; color: #5A5A7A; margin-top: 4px; }
    .badge { display: inline-block; padding: 4px 10px; border-radius: 8px; font-size: 11px; font-weight: 600; }
    .badge-pending { background: rgba(255,140,66,0.1); color: #FF8C42; border: 1px solid rgba(255,140,66,0.2); }
    .badge-verified { background: rgba(30,235,180,0.1); color: #1EEBB4; border: 1px solid rgba(30,235,180,0.2); }
    .badge-completed { background: rgba(30,235,180,0.1); color: #1EEBB4; border: 1px solid rgba(30,235,180,0.2); }
    .badge-delivered { background: rgba(91,107,248,0.1); color: #8B9FFF; border: 1px solid rgba(91,107,248,0.2); }
    .badge-received { background: rgba(167,139,250,0.1); color: #A78BFA; border: 1px solid rgba(167,139,250,0.2); }
    .badge-purchased { background: rgba(91,107,248,0.1); color: #8B9FFF; border: 1px solid rgba(91,107,248,0.2); }
    .badge-inactive { background: rgba(255,75,110,0.1); color: #FF4B6E; border: 1px solid rgba(255,75,110,0.2); }
    .badge-active { background: rgba(30,235,180,0.1); color: #1EEBB4; border: 1px solid rgba(30,235,180,0.2); }
    .photos { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 16px; }
    .photos-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 16px; }
    .photo-box { aspect-ratio: 4/3; background: #181828; border-radius: 10px; overflow: hidden; cursor: pointer; border: 1px solid rgba(255,255,255,0.07); }
    .photo-box img { width: 100%; height: 100%; object-fit: cover; }
    .no-photo { display: flex; align-items: center; justify-content: center; height: 100%; color: #5A5A7A; font-size: 12px; }
    .photo-label { font-size: 11px; color: #5A5A7A; margin-bottom: 6px; }
    .actions { display: flex; gap: 10px; }
    .empty { text-align: center; padding: 60px; color: #5A5A7A; }
    .stats { display: grid; grid-template-columns: repeat(5, 1fr); gap: 12px; margin-bottom: 24px; }
    .stat-card { background: #10101C; border: 1px solid rgba(255,255,255,0.07); border-radius: 12px; padding: 16px; text-align: center; }
    .stat-val { font-size: 28px; font-weight: 800; color: #5B6BF8; }
    .stat-lbl { font-size: 11px; color: #5A5A7A; margin-top: 4px; }
    .nav-tabs { display: flex; gap: 8px; margin-bottom: 24px; border-bottom: 1px solid rgba(255,255,255,0.07); padding-bottom: 12px; }
    .nav-tab { padding: 10px 20px; border-radius: 10px; font-size: 13px; cursor: pointer; border: 1px solid rgba(255,255,255,0.07); background: #10101C; color: #8A8AAA; font-weight: 500; }
    .nav-tab.active { background: #5B6BF8; color: white; border-color: #5B6BF8; }
    .tabs { display: flex; gap: 8px; margin-bottom: 20px; }
    .tab { padding: 8px 16px; border-radius: 10px; font-size: 12px; cursor: pointer; border: 1px solid rgba(255,255,255,0.07); background: #10101C; color: #8A8AAA; }
    .tab.active { background: #5B6BF8; color: white; border-color: #5B6BF8; }
    .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 1000; align-items: center; justify-content: center; }
    .modal.open { display: flex; }
    .modal img { max-width: 90vw; max-height: 90vh; border-radius: 12px; }
    .modal-close { position: absolute; top: 20px; right: 20px; color: white; font-size: 24px; cursor: pointer; background: rgba(0,0,0,0.5); width: 40px; height: 40px; border-radius: 20px; display: flex; align-items: center; justify-content: center; }
    .request-info { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 16px; font-size: 12px; }
    .request-info-item { background: #181828; border-radius: 8px; padding: 8px 12px; }
    .request-info-label { color: #5A5A7A; margin-bottom: 2px; font-size: 10px; text-transform: uppercase; }
    .request-info-value { color: #F0F0FF; font-weight: 600; }
    .section-divider { font-size: 11px; color: #5A5A7A; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 12px; margin-top: 4px; }
    .trip-items { background: #181828; border-radius: 10px; padding: 10px; margin-bottom: 12px; }
    .trip-item-row { display: flex; justify-content: space-between; padding: 4px 0; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 12px; }
    .trip-item-row:last-child { border-bottom: none; }
  </style>
</head>
<body>

<div class="login-screen" id="loginScreen">
  <div class="login-box">
    <h1>Nexvo Admin</h1>
    <p>Panel de administración</p>
    <input type="password" id="adminPassword" placeholder="Contraseña de admin" onkeypress="if(event.key==='Enter') checkPassword()" />
    <button class="btn" id="loginBtn">Entrar</button>
  </div>
</div>

<div class="dashboard" id="dashboard" style="display:none">
  <div class="header">
    <h1>🛡️ Nexvo Admin</h1>
    <button class="btn btn-small btn-red" id="logoutBtn">Salir</button>
  </div>

  <div class="stats">
    <div class="stat-card"><div class="stat-val" id="statPending">-</div><div class="stat-lbl">Verificaciones pendientes</div></div>
    <div class="stat-card"><div class="stat-val" id="statVerified">-</div><div class="stat-lbl">Viajeros verificados</div></div>
    <div class="stat-card"><div class="stat-val" id="statTotal">-</div><div class="stat-lbl">Total usuarios</div></div>
    <div class="stat-card"><div class="stat-val" id="statRequests">-</div><div class="stat-lbl">Total solicitudes</div></div>
    <div class="stat-card"><div class="stat-val" id="statTrips">-</div><div class="stat-lbl">Total viajes</div></div>
  </div>

  <div class="nav-tabs">
    <div class="nav-tab active" id="nav-users" onclick="setNav('users')">👥 Verificaciones</div>
    <div class="nav-tab" id="nav-trips" onclick="setNav('trips')">✈️ Viajes</div>
    <div class="nav-tab" id="nav-requests" onclick="setNav('requests')">📁 Respaldos</div>
  </div>

  <div id="section-users">
    <div class="tabs">
      <div class="tab active" id="tab-pending">⏳ Pendientes</div>
      <div class="tab" id="tab-verified">✅ Verificados</div>
      <div class="tab" id="tab-all">👥 Todos</div>
    </div>
    <div id="usersList"></div>
  </div>

  <div id="section-trips" style="display:none">
    <div class="tabs">
      <div class="tab active" id="trip-tab-active">✅ Activos</div>
      <div class="tab" id="trip-tab-inactive">🚫 Inactivos</div>
      <div class="tab" id="trip-tab-all">✈️ Todos</div>
    </div>
    <div id="tripsList"></div>
  </div>

  <div id="section-requests" style="display:none">
    <div class="tabs">
      <div class="tab active" id="req-tab-all">📦 Todas</div>
      <div class="tab" id="req-tab-active">🔄 Activas</div>
      <div class="tab" id="req-tab-completed">✅ Completadas</div>
    </div>
    <div id="requestsList"></div>
  </div>
</div>

<div class="modal" id="photoModal">
  <div class="modal-close" id="modalClose">✕</div>
  <img id="modalImg" src="" />
</div>

<script>
  const SUPABASE_URL = 'https://httbdrbtgepoplqsrhyk.supabase.co';
  const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imh0dGJkcmJ0Z2Vwb3BscXNyaHlrIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTc3NTQ4NjE2NCwiZXhwIjoyMDkxMDYyMTY0fQ.nRbpdxkz0KIbH0eGaOmWbRh7lvJf65TFj2c0BMqCcvg';
  const ADMIN_PASSWORD = 'nexvo2026admin';

  const db = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  let currentTab = 'pending';
  let currentReqTab = 'all';
  let currentTripTab = 'active';
  let currentNav = 'users';
  let allUsers = [];
  let allRequests = [];
  let allTrips = [];

  function checkPassword() {
    const pwd = document.getElementById('adminPassword').value;
    if (pwd === ADMIN_PASSWORD) {
      document.getElementById('loginScreen').style.display = 'none';
      document.getElementById('dashboard').style.display = 'block';
      loadAll();
    } else {
      alert('Contraseña incorrecta');
    }
  }

  function logout() {
    document.getElementById('loginScreen').style.display = 'flex';
    document.getElementById('dashboard').style.display = 'none';
    document.getElementById('adminPassword').value = '';
  }

  async function loadAll() {
    await Promise.all([loadUsers(), loadRequests(), loadTrips()]);
  }

  function setNav(nav) {
    currentNav = nav;
    document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
    document.getElementById('nav-' + nav).classList.add('active');
    document.getElementById('section-users').style.display = nav === 'users' ? 'block' : 'none';
    document.getElementById('section-trips').style.display = nav === 'trips' ? 'block' : 'none';
    document.getElementById('section-requests').style.display = nav === 'requests' ? 'block' : 'none';
  }

  function setTab(tab) {
    currentTab = tab;
    document.querySelectorAll('#section-users .tab').forEach(t => t.classList.remove('active'));
    document.getElementById('tab-' + tab).classList.add('active');
    renderUsers();
  }

  function setReqTab(tab) {
    currentReqTab = tab;
    document.querySelectorAll('#section-requests .tab').forEach(t => t.classList.remove('active'));
    document.getElementById('req-tab-' + tab).classList.add('active');
    renderRequests();
  }

  function setTripTab(tab) {
    currentTripTab = tab;
    document.querySelectorAll('#section-trips .tab').forEach(t => t.classList.remove('active'));
    document.getElementById('trip-tab-' + tab).classList.add('active');
    renderTrips();
  }

  async function getSignedUrl(path) {
    if (!path) return null;
    const { data, error } = await db.storage
      .from('verification-docs')
      .createSignedUrl(path, 60 * 60);
    if (error || !data) return null;
    return data.signedUrl;
  }

  async function getSignedUrlFromFull(fullUrl) {
    if (!fullUrl) return null;
    if (fullUrl.startsWith('file://')) return null;
    const parts = fullUrl.split('/verification-docs/');
    if (parts.length < 2) return null;
    return await getSignedUrl(decodeURIComponent(parts[1]));
  }

  // ==================== USUARIOS ====================

  async function loadUsers() {
    const { data } = await db.from('profiles').select('*').order('created_at', { ascending: false });
    allUsers = data || [];
    document.getElementById('statPending').textContent = allUsers.filter(u => u.verification_status === 'pending').length;
    document.getElementById('statVerified').textContent = allUsers.filter(u => u.verified).length;
    document.getElementById('statTotal').textContent = allUsers.length;
    await renderUsers();
  }

  async function renderUsers() {
    let users = allUsers;
    if (currentTab === 'pending') users = allUsers.filter(u => u.verification_status === 'pending');
    if (currentTab === 'verified') users = allUsers.filter(u => u.verified);

    const list = document.getElementById('usersList');
    if (users.length === 0) {
      list.innerHTML = '<div class="empty">No hay usuarios en esta categoría</div>';
      return;
    }

    list.innerHTML = '<div class="empty">Cargando fotos...</div>';

    const cards = await Promise.all(users.map(async function(user) {
      const frontUrl = await getSignedUrl(user.id + '/cedula-frente.jpg');
      const backUrl = await getSignedUrl(user.id + '/cedula-reverso.jpg');
      const selfieUrl = await getSignedUrl(user.id + '/selfie.jpg');

      function photoBox(url, label) {
        return '<div>' +
          '<div class="photo-label">' + label + '</div>' +
          '<div class="photo-box"' + (url ? ' onclick="openModal(\'' + url + '\')"' : '') + '>' +
          (url ? '<img src="' + url + '" onerror="this.parentElement.innerHTML=\'<div class=no-photo>Sin foto</div>\'" />' : '<div class="no-photo">Sin foto</div>') +
          '</div></div>';
      }

      return '<div class="card">' +
        '<div class="card-header">' +
          '<div><div class="user-name">' + (user.full_name || 'Sin nombre') + '</div>' +
          '<div class="user-email">' + (user.email || '') + '</div></div>' +
          '<span class="badge ' + (user.verified ? 'badge-verified' : 'badge-pending') + '">' +
          (user.verified ? '✅ Verificado' : '⏳ Pendiente') + '</span>' +
        '</div>' +
        '<div class="photos">' +
          photoBox(frontUrl, 'Cédula — Frente') +
          photoBox(backUrl, 'Cédula — Reverso') +
          photoBox(selfieUrl, 'Selfie') +
        '</div>' +
        '<div class="actions">' +
          (!user.verified ? '<button class="btn btn-green btn-small" onclick="approveUser(\'' + user.id + '\')">✓ Aprobar</button>' : '') +
          (user.verified ? '<button class="btn btn-red btn-small" onclick="rejectUser(\'' + user.id + '\')">✕ Revocar</button>' : '') +
        '</div></div>';
    }));

    list.innerHTML = cards.join('');
  }

  async function approveUser(userId) {
    if (!confirm('¿Aprobar este viajero?')) return;
    await db.from('profiles').update({ verified: true, verification_status: 'verified' }).eq('id', userId);
    await loadUsers();
  }

  async function rejectUser(userId) {
    if (!confirm('¿Revocar la verificación?')) return;
    await db.from('profiles').update({ verified: false, verification_status: 'rejected' }).eq('id', userId);
    await loadUsers();
  }

  // ==================== VIAJES ====================

  async function loadTrips() {
    const { data } = await db
      .from('trips')
      .select('*, profiles(full_name, email), trip_items(name, price, billing_type, max_quantity)')
      .order('created_at', { ascending: false });
    allTrips = data || [];
    document.getElementById('statTrips').textContent = allTrips.length;
    renderTrips();
  }

  function renderTrips() {
    let trips = allTrips;
    if (currentTripTab === 'active') trips = allTrips.filter(t => t.active);
    if (currentTripTab === 'inactive') trips = allTrips.filter(t => !t.active);

    const list = document.getElementById('tripsList');
    if (trips.length === 0) {
      list.innerHTML = '<div class="empty">No hay viajes en esta categoría</div>';
      return;
    }

    list.innerHTML = trips.map(function(trip) {
      const items = (trip.trip_items || []).map(i =>
        '<div class="trip-item-row">' +
          '<span style="color:#F0F0FF">' + i.name + '</span>' +
          '<span style="color:#8A8AAA">$' + i.price + ' / ' + (i.billing_type === 'lb' ? 'lb' : 'ítem') + ' · máx ' + i.max_quantity + '</span>' +
        '</div>'
      ).join('');

      return '<div class="card">' +
        '<div class="card-header">' +
          '<div>' +
            '<div class="user-name">' + (trip.origin_city || '') + ' → 🇪🇨 ' + (trip.destination_city || '') + '</div>' +
            '<div class="user-email">✈️ ' + (trip.travel_date || '') + ' · ' + (trip.profiles?.full_name || '') + '</div>' +
          '</div>' +
          '<span class="badge ' + (trip.active ? 'badge-active' : 'badge-inactive') + '">' +
          (trip.active ? '✅ Activo' : '🚫 Inactivo') + '</span>' +
        '</div>' +
        '<div class="trip-items">' + (items || '<div style="color:#5A5A7A;font-size:12px">Sin ítems</div>') + '</div>' +
        '<div class="actions">' +
          (trip.active
            ? '<button class="btn btn-red btn-small" onclick="deactivateTrip(\'' + trip.id + '\')">🚫 Desactivar viaje</button>'
            : '<button class="btn btn-green btn-small" onclick="activateTrip(\'' + trip.id + '\')">✅ Reactivar viaje</button>') +
        '</div>' +
      '</div>';
    }).join('');
  }

  async function deactivateTrip(tripId) {
    if (!confirm('¿Desactivar este viaje? Ya no aparecerá en el inicio para nuevos compradores.')) return;
    await db.from('trips').update({ active: false }).eq('id', tripId);
    await loadTrips();
  }

  async function activateTrip(tripId) {
    if (!confirm('¿Reactivar este viaje?')) return;
    await db.from('trips').update({ active: true }).eq('id', tripId);
    await loadTrips();
  }

  // ==================== RESPALDOS ====================

  async function loadRequests() {
    const { data, error } = await db
      .from('requests')
      .select('*, trips(origin_city, destination_city, travel_date), request_items(name, quantity, price)')
      .order('created_at', { ascending: false });

    if (error) { console.log('Error requests:', JSON.stringify(error)); return; }

    const requests = data || [];
    const profileIds = [...new Set([
      ...requests.map(r => r.buyer_id),
      ...requests.map(r => r.traveler_id)
    ].filter(Boolean))];

    let profilesMap = {};
    if (profileIds.length > 0) {
      const { data: profiles } = await db.from('profiles').select('id, full_name, email').in('id', profileIds);
      (profiles || []).forEach(p => { profilesMap[p.id] = p; });
    }

    allRequests = requests.map(r => ({
      ...r,
      buyer: profilesMap[r.buyer_id] || null,
      traveler: profilesMap[r.traveler_id] || null,
    }));

    document.getElementById('statRequests').textContent = allRequests.length;
    renderRequests();
  }

  async function renderRequests() {
    let requests = allRequests;
    if (currentReqTab === 'active') requests = allRequests.filter(r => ['pending','accepted','purchased','received','delivered'].includes(r.status));
    if (currentReqTab === 'completed') requests = allRequests.filter(r => r.status === 'completed');

    const list = document.getElementById('requestsList');
    if (requests.length === 0) {
      list.innerHTML = '<div class="empty">No hay solicitudes en esta categoría</div>';
      return;
    }

    list.innerHTML = '<div class="empty">Cargando respaldos...</div>';

    const statusLabels = {
      pending: '⏳ Pendiente', accepted: '✓ Aceptada', purchased: '🛍️ Compra confirmada',
      received: '📬 Producto recibido', delivered: '📦 Foto subida', completed: '✅ Completada',
      rejected: '✕ Rechazada', cancelled: '✕ Cancelada'
    };
    const statusBadge = {
      pending: 'badge-pending', accepted: 'badge-verified', purchased: 'badge-purchased',
      received: 'badge-received', delivered: 'badge-delivered', completed: 'badge-completed',
      rejected: 'badge-pending', cancelled: 'badge-pending'
    };

    const cards = await Promise.all(requests.map(async function(req) {
      const purchasePhotoUrl = await getSignedUrlFromFull(req.purchase_photo_url);
      const receivedPhotoUrl = await getSignedUrlFromFull(req.received_photo_url);
      const deliveryPhotoUrl = await getSignedUrlFromFull(req.delivery_photo_url);

      function photoBox(url, label) {
        return '<div>' +
          '<div class="photo-label">' + label + '</div>' +
          '<div class="photo-box"' + (url ? ' onclick="openModal(\'' + url + '\')"' : '') + '>' +
          (url ? '<img src="' + url + '" onerror="this.parentElement.innerHTML=\'<div class=no-photo>Sin foto</div>\'" />' : '<div class="no-photo">Sin foto</div>') +
          '</div></div>';
      }

      const items = (req.request_items || []).map(i => i.name + ' ×' + i.quantity).join(', ');

      return '<div class="card">' +
        '<div class="card-header">' +
          '<div>' +
            '<div class="user-name">' + (items || 'Sin ítems') + '</div>' +
            '<div class="user-email">#' + req.id.slice(0, 8).toUpperCase() + ' · ' + (req.trips?.origin_city || '') + ' → ' + (req.trips?.destination_city || '') + '</div>' +
          '</div>' +
          '<span class="badge ' + (statusBadge[req.status] || '') + '">' + (statusLabels[req.status] || req.status) + '</span>' +
        '</div>' +
        '<div class="request-info">' +
          '<div class="request-info-item"><div class="request-info-label">Comprador</div><div class="request-info-value">' + (req.buyer?.full_name || '-') + '</div></div>' +
          '<div class="request-info-item"><div class="request-info-label">Viajero</div><div class="request-info-value">' + (req.traveler?.full_name || '-') + '</div></div>' +
          '<div class="request-info-item"><div class="request-info-label">Total</div><div class="request-info-value">$' + (req.total_amount?.toFixed(2) || '0.00') + '</div></div>' +
          '<div class="request-info-item"><div class="request-info-label">Fecha vuelo</div><div class="request-info-value">' + (req.trips?.travel_date || '-') + '</div></div>' +
        '</div>' +
        '<div class="section-divider">Fotos de respaldo</div>' +
        '<div class="photos-3">' +
          photoBox(purchasePhotoUrl, '🛍️ Confirmación compra') +
          photoBox(receivedPhotoUrl, '📬 Recepción producto') +
          photoBox(deliveryPhotoUrl, '📸 Entrega al comprador') +
        '</div>' +
        (req.tracking_number ? '<div style="font-size:11px;color:#5A5A7A;margin-top:4px;">Tracking: <span style="color:#F0F0FF">' + req.tracking_number + '</span></div>' : '') +
      '</div>';
    }));

    list.innerHTML = cards.join('');
  }

  function openModal(url) {
    document.getElementById('modalImg').src = url;
    document.getElementById('photoModal').classList.add('open');
  }

  function closeModal() {
    document.getElementById('photoModal').classList.remove('open');
  }

  document.getElementById('loginBtn').addEventListener('click', checkPassword);
  document.getElementById('logoutBtn').addEventListener('click', logout);
  document.getElementById('modalClose').addEventListener('click', closeModal);
  document.getElementById('photoModal').addEventListener('click', function(e) {
    if (e.target === this) closeModal();
  });
  document.getElementById('tab-pending').addEventListener('click', function() { setTab('pending'); });
  document.getElementById('tab-verified').addEventListener('click', function() { setTab('verified'); });
  document.getElementById('tab-all').addEventListener('click', function() { setTab('all'); });
  document.getElementById('req-tab-all').addEventListener('click', function() { setReqTab('all'); });
  document.getElementById('req-tab-active').addEventListener('click', function() { setReqTab('active'); });
  document.getElementById('req-tab-completed').addEventListener('click', function() { setReqTab('completed'); });
  document.getElementById('trip-tab-active').addEventListener('click', function() { setTripTab('active'); });
  document.getElementById('trip-tab-inactive').addEventListener('click', function() { setTripTab('inactive'); });
  document.getElementById('trip-tab-all').addEventListener('click', function() { setTripTab('all'); });
</script>
</body>
</html>
