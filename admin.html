<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin — Nexvo</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: Arial, sans-serif; background: #07070F; color: #F0F0FF; min-height: 100vh; }
    .login-screen { display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .login-box { background: #10101C; border: 1px solid rgba(255,255,255,0.07); border-radius: 20px; padding: 40px; width: 100%; max-width: 400px; }
    .login-box h1 { color: #5B6BF8; font-size: 28px; margin-bottom: 8px; }
    .login-box p { color: #5A5A7A; font-size: 13px; margin-bottom: 24px; }
    input { width: 100%; background: #181828; border: 1px solid rgba(255,255,255,0.07); border-radius: 10px; padding: 12px; color: #F0F0FF; font-size: 14px; margin-bottom: 12px; }
    .btn { width: 100%; background: #5B6BF8; color: white; border: none; border-radius: 12px; padding: 13px; font-size: 15px; font-weight: 700; cursor: pointer; }
    .btn:hover { background: #4a5ae0; }
    .btn-green { background: #1EEBB4; color: #07070F; }
    .btn-green:hover { background: #18cc9a; }
    .btn-red { background: rgba(255,75,110,0.2); color: #FF4B6E; border: 1px solid rgba(255,75,110,0.3); }
    .btn-small { width: auto; padding: 8px 16px; font-size: 12px; border-radius: 8px; }
    .dashboard { padding: 24px; max-width: 1000px; margin: 0 auto; }
    .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 32px; }
    .header h1 { color: #5B6BF8; font-size: 24px; }
    .card { background: #10101C; border: 1px solid rgba(255,255,255,0.07); border-radius: 16px; padding: 20px; margin-bottom: 16px; }
    .card-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 16px; }
    .user-name { font-size: 16px; font-weight: 700; color: #F0F0FF; }
    .user-email { font-size: 12px; color: #5A5A7A; margin-top: 4px; }
    .badge { display: inline-block; padding: 4px 10px; border-radius: 8px; font-size: 11px; font-weight: 600; }
    .badge-pending { background: rgba(255,140,66,0.1); color: #FF8C42; border: 1px solid rgba(255,140,66,0.2); }
    .badge-verified { background: rgba(30,235,180,0.1); color: #1EEBB4; border: 1px solid rgba(30,235,180,0.2); }
    .photos { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 16px; }
    .photo-box { aspect-ratio: 4/3; background: #181828; border-radius: 10px; overflow: hidden; cursor: pointer; border: 1px solid rgba(255,255,255,0.07); }
    .photo-box img { width: 100%; height: 100%; object-fit: cover; }
    .photo-box .no-photo { display: flex; align-items: center; justify-content: center; height: 100%; color: #5A5A7A; font-size: 12px; }
    .photo-label { font-size: 11px; color: #5A5A7A; margin-bottom: 6px; }
    .actions { display: flex; gap: 10px; }
    .empty { text-align: center; padding: 60px; color: #5A5A7A; }
    .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 24px; }
    .stat-card { background: #10101C; border: 1px solid rgba(255,255,255,0.07); border-radius: 12px; padding: 16px; text-align: center; }
    .stat-val { font-size: 28px; font-weight: 800; color: #5B6BF8; }
    .stat-lbl { font-size: 11px; color: #5A5A7A; margin-top: 4px; }
    .tabs { display: flex; gap: 8px; margin-bottom: 20px; }
    .tab { padding: 8px 16px; border-radius: 10px; font-size: 12px; cursor: pointer; border: 1px solid rgba(255,255,255,0.07); background: #10101C; color: #8A8AAA; }
    .tab.active { background: #5B6BF8; color: white; border-color: #5B6BF8; }
    .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 1000; align-items: center; justify-content: center; }
    .modal.open { display: flex; }
    .modal img { max-width: 90vw; max-height: 90vh; border-radius: 12px; }
    .modal-close { position: absolute; top: 20px; right: 20px; color: white; font-size: 24px; cursor: pointer; background: rgba(0,0,0,0.5); width: 40px; height: 40px; border-radius: 20px; display: flex; align-items: center; justify-content: center; }
  </style>
</head>
<body>

<!-- Login -->
<div class="login-screen" id="loginScreen">
  <div class="login-box">
    <h1>Nexvo Admin</h1>
    <p>Panel de administración</p>
    <input type="password" id="adminPassword" placeholder="Contraseña de admin" />
    <button class="btn" onclick="checkPassword()">Entrar</button>
  </div>
</div>

<!-- Dashboard -->
<div class="dashboard" id="dashboard" style="display:none">
  <div class="header">
    <h1>🛡️ Nexvo Admin</h1>
    <button class="btn btn-small" onclick="logout()" style="background:rgba(255,75,110,0.2);color:#FF4B6E;border:1px solid rgba(255,75,110,0.3)">Salir</button>
  </div>

  <div class="stats">
    <div class="stat-card">
      <div class="stat-val" id="statPending">-</div>
      <div class="stat-lbl">Pendientes</div>
    </div>
    <div class="stat-card">
      <div class="stat-val" id="statVerified">-</div>
      <div class="stat-lbl">Verificados</div>
    </div>
    <div class="stat-card">
      <div class="stat-val" id="statTotal">-</div>
      <div class="stat-lbl">Total usuarios</div>
    </div>
  </div>

  <div class="tabs">
    <div class="tab active" onclick="setTab('pending')">⏳ Pendientes</div>
    <div class="tab" onclick="setTab('verified')">✅ Verificados</div>
    <div class="tab" onclick="setTab('all')">👥 Todos</div>
  </div>

  <div id="usersList"></div>
</div>

<!-- Modal foto -->
<div class="modal" id="photoModal" onclick="closeModal()">
  <div class="modal-close">✕</div>
  <img id="modalImg" src="" />
</div>

<script>
  const SUPABASE_URL = 'https://httbdrbtgepoplqsrhyk.supabase.co';
  const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imh0dGJkcmJ0Z2Vwb3BscXNyaHlrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU0ODYxNjQsImV4cCI6MjA5MTA2MjE2NH0.FFCKj6M3PDVPBMqXI2Wqk3lzacmDwlzLyr-_YJSTYEc';
  const ADMIN_PASSWORD = 'nexvo2026admin';
  const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  let currentTab = 'pending';
  let allUsers = [];

  function checkPassword() {
    const pwd = document.getElementById('adminPassword').value;
    if (pwd === ADMIN_PASSWORD) {
      document.getElementById('loginScreen').style.display = 'none';
      document.getElementById('dashboard').style.display = 'block';
      loadUsers();
    } else {
      alert('Contraseña incorrecta');
    }
  }

  function logout() {
    document.getElementById('loginScreen').style.display = 'flex';
    document.getElementById('dashboard').style.display = 'none';
    document.getElementById('adminPassword').value = '';
  }

  function setTab(tab) {
    currentTab = tab;
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    event.target.classList.add('active');
    renderUsers();
  }

  async function loadUsers() {
    const { data } = await supabase.from('profiles').select('*').order('created_at', { ascending: false });
    allUsers = data || [];
    
    document.getElementById('statPending').textContent = allUsers.filter(u => u.verification_status === 'pending').length;
    document.getElementById('statVerified').textContent = allUsers.filter(u => u.verified).length;
    document.getElementById('statTotal').textContent = allUsers.length;
    
    renderUsers();
  }

  function renderUsers() {
    let users = allUsers;
    if (currentTab === 'pending') users = allUsers.filter(u => u.verification_status === 'pending');
    if (currentTab === 'verified') users = allUsers.filter(u => u.verified);

    const list = document.getElementById('usersList');
    
    if (users.length === 0) {
      list.innerHTML = '<div class="empty">No hay usuarios en esta categoría</div>';
      return;
    }

    list.innerHTML = users.map(user => {
      const frontUrl = getPhotoUrl(user.id, 'cedula-frente.jpg');
      const backUrl = getPhotoUrl(user.id, 'cedula-reverso.jpg');
      const selfieUrl = getPhotoUrl(user.id, 'selfie.jpg');
      
      return `
        <div class="card">
          <div class="card-header">
            <div>
              <div class="user-name">${user.full_name || 'Sin nombre'}</div>
              <div class="user-email">${user.email || ''}</div>
            </div>
            <span class="badge ${user.verified ? 'badge-verified' : 'badge-pending'}">
              ${user.verified ? '✅ Verificado' : '⏳ Pendiente'}
            </span>
          </div>
          
          <div class="photos">
            <div>
              <div class="photo-label">Cédula — Frente</div>
              <div class="photo-box" onclick="openModal('${frontUrl}')">
                <img src="${frontUrl}" onerror="this.parentElement.innerHTML='<div class=no-photo>Sin foto</div>'" />
              </div>
            </div>
            <div>
              <div class="photo-label">Cédula — Reverso</div>
              <div class="photo-box" onclick="openModal('${backUrl}')">
                <img src="${backUrl}" onerror="this.parentElement.innerHTML='<div class=no-photo>Sin foto</div>'" />
              </div>
            </div>
            <div>
              <div class="photo-label">Selfie con documento</div>
              <div class="photo-box" onclick="openModal('${selfieUrl}')">
                <img src="${selfieUrl}" onerror="this.parentElement.innerHTML='<div class=no-photo>Sin foto</div>'" />
              </div>
            </div>
          </div>
          
          <div class="actions">
            ${!user.verified ? `<button class="btn btn-green btn-small" onclick="approveUser('${user.id}')">✓ Aprobar viajero</button>` : ''}
            ${user.verified ? `<button class="btn btn-red btn-small" onclick="rejectUser('${user.id}')">✕ Revocar verificación</button>` : ''}
          </div>
        </div>
      `;
    }).join('');
  }

  function getPhotoUrl(userId, fileName) {
    const { data } = supabase.storage.from('verification-docs').getPublicUrl(`${userId}/${fileName}`);
    return data.publicUrl;
  }

  async function approveUser(userId) {
    if (!confirm('¿Aprobar este viajero?')) return;
    await supabase.from('profiles').update({ verified: true, verification_status: 'verified' }).eq('id', userId);
    await loadUsers();
  }

  async function rejectUser(userId) {
    if (!confirm('¿Revocar la verificación de este viajero?')) return;
    await supabase.from('profiles').update({ verified: false, verification_status: 'rejected' }).eq('id', userId);
    await loadUsers();
  }

  function openModal(url) {
    document.getElementById('modalImg').src = url;
    document.getElementById('photoModal').classList.add('open');
  }

  function closeModal() {
    document.getElementById('photoModal').classList.remove('open');
  }

  document.getElementById('adminPassword').addEventListener('keypress', function(e) {
    if (e.key === 'Enter') checkPassword();
  });
</script>
</body>
</html>
